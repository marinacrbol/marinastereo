<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marina Stereo 91.7 FM | El Carmen de Bolívar</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

background-image:url('banner.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;

height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.overlay{

background:rgba(0,0,0,0.75);
padding:40px;
border-radius:15px;
width:340px;
box-shadow:0 0 25px rgba(0,0,0,0.6);

}

/* AREA DE CARATULA */

.cover{

width:200px;
height:200px;

margin:auto;
margin-bottom:15px;

border-radius:12px;

background:white;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

}

.cover img{

width:100%;
height:100%;

object-fit:contain;

}

/* TITULO */

h2{

margin:5px 0;
font-size:22px;
text-shadow:0 0 10px rgba(0,0,0,0.9);

}

/* UBICACION */

.location{

font-size:14px;
margin-bottom:20px;
opacity:0.9;

}

/* BOTON PLAY */

.play{

background:#1db954;
border:none;
padding:12px 25px;
border-radius:30px;
font-size:16px;
color:white;
cursor:pointer;
margin-bottom:15px;

}

.play:hover{

background:#17a74a;

}

/* BOTON COMPARTIR */

.share{

margin-top:10px;
background:#007bff;
border:none;
padding:10px 20px;
border-radius:25px;
color:white;
font-size:14px;
cursor:pointer;

}

.share:hover{

background:#0056b3;

}

/* REDES */

.social img{

width:38px;
margin:10px;
transition:0.3s;

}

.social img:hover{

transform:scale(1.2);

}

</style>

</head>

<body>

<div class="overlay">

<!-- CARATULA -->

<div class="cover">

<img id="coverImg" src="logo.jpg">

</div>

<h2>Marina Stereo 91.7 FM</h2>

<div class="location">

El Carmen de Bolívar - Colombia

</div>

<audio id="radio">

<source src="https://stream.zeno.fm/momzs1lrytjtv" type="audio/mpeg">

</audio>

<button class="play" onclick="togglePlay()" id="playBtn">

▶ Escuchar en vivo

</button>

<button class="share" onclick="compartirRadio()">

📲 Compartir esta emisora

</button>

<div class="social">

<a href="https://wa.me/573218178263" target="_blank">

<img src="Whatsapp.png">

</a>

<a href="https://www.instagram.com/marinastereo_arc/" target="_blank">

<img src="instagram.png">

</a>

<a href="https://www.facebook.com/share/185JMgMCwJ/" target="_blank">

<img src="facebook.png">

</a>

</div>

</div>

<script>

var audio=document.getElementById("radio");

var btn=document.getElementById("playBtn");

function togglePlay(){

if(audio.paused){

audio.play();

btn.innerHTML="⏸ Pausar";

}

else{

audio.pause();

btn.innerHTML="▶ Escuchar en vivo";

}

}

/* BOTON COMPARTIR */

function compartirRadio(){

if(navigator.share){

navigator.share({

title:"Marina Stereo 91.7 FM",
text:"Escucha Marina Stereo en vivo",
url:"https://marinacrbol.github.io/marinastereo/"

});

}else{

alert("Comparte este enlace: https://marinacrbol.github.io/marinastereo/");

}

}

/* CARATULA AUTOMATICA */

async function cargarCaratula(){

try{

let data=await fetch("https://api.streamafrica.net/new.php?url=https://stream.zeno.fm/momzs1lrytjtv");

let json=await data.json();

let artista=json.artist;

let cancion=json.title;

let portada="https://api.streamafrica.net/cover.php?artist="+artista+"&title="+cancion;

document.getElementById("coverImg").src=portada;

}

catch(e){

console.log("No se pudo cargar carátula");

}

}

setInterval(cargarCaratula,15000);

</script>

</body>

</html>
