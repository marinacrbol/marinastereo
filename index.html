<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marina Stereo 91.7 FM | El Carmen de Bolívar</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

background-image:url('banner.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;

height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.overlay{
background:rgba(0,0,0,0.70);
padding:40px;
border-radius:15px;
width:340px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.logo{
width:180px;
margin-bottom:10px;
}

h2{
margin:5px 0;
font-size:22px;
text-shadow:0 0 10px rgba(0,0,0,0.9);
}

.location{
font-size:14px;
margin-bottom:20px;
opacity:0.9;
text-shadow:0 0 10px rgba(0,0,0,0.9);
}

.play{
background:#00d084;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:25px;
cursor:pointer;
color:white;
font-weight:bold;
margin-top:10px;
}

.play:hover{
background:#00a86b;
}

.social{
margin-top:20px;
font-size:24px;
}

.social a{
margin:10px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="overlay">

<img src="logotipo.jpg" class="logo">

<h2>Marina Stereo 91.7 FM</h2>

<div class="location">
El Carmen de Bolívar - Colombia
</div>

<audio id="radio">
<source src="https://stream.zeno.fm/momzs1lrytjtv" type="audio/mpeg">
</audio>

<button class="play" onclick="togglePlay()" id="playBtn">
▶ Escuchar en vivo
</button>

<div class="social">

<a href="https://wa.me/573218178263" target="_blank">📲</a>

<a href="https://www.instagram.com/marinastereo_arc/" target="_blank">📷</a>

<a href="https://www.facebook.com/share/185JMgMCwJ/" target="_blank">📘</a>

</div>

</div>

<script>

var audio=document.getElementById("radio");
var btn=document.getElementById("playBtn");

function togglePlay(){

if(audio.paused){
audio.play();
btn.innerHTML="⏸ Pausar";
}

else{
audio.pause();
btn.innerHTML="▶ Escuchar en vivo";
}

}

</script>

</body>
</html>
